<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Kage Translate</title>

    <meta name="theme-color"
          content="#161311">

    <link rel="manifest"
          href="manifest.json">

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

    <header>

        <h1>
            <span>Kage</span> Translate
        </h1>

        <p>
            Manga va Manhwa tarjima platformasi
        </p>

    </header>

    <main>

        <!-- Til -->

        <section class="card">

            <h2>Til tanlash</h2>

            <button id="englishBtn">
                Inglizcha
            </button>

            <button id="russianBtn">
                Ruscha
            </button>

        </section>


        <!-- Shrift -->

        <section class="card">

            <h2>Shrift</h2>

            <button>
                Oddiy
            </button>

            <button>
                Manga
            </button>

            <button>
                Handwritten
            </button>

        </section>


        <!-- Fayl -->

        <section class="card">

            <h2>Fayl yuklash</h2>

            <input
                type="file"
                id="fileInput"
                multiple>

        </section>


        <!-- Boshlash -->

        <section class="card">

            <button id="startButton">

                Tarjima qilish

            </button>

        </section>


        <!-- Holat -->

        <section class="card">

            <h2>Holati</h2>

            <p id="status">

                Fayl tanlanmagan

            </p>

        </section>


        <!-- Natija -->

        <section class="card">

            <h2>Natija</h2>

            <div id="result">

            </div>

        </section>

    </main>

    <script src="main.js"></script>

</body>

                            </html>
