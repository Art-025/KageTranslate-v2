<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Kage Translate</title>

    <meta name="theme-color"
          content="#161311">

    <link rel="manifest"
          href="manifest.json">

    <!-- Fayllar mavjudligini repo'da tekshiring -->
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="stylesheet"
          href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
    // MUHIM: workerSrc ko'rsatilmasa PDF.js hech qanday PDF'ni ocholmaydi.
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

    <noscript>
        Bu sayt ishlashi uchun brauzeringizda JavaScript yoqilgan bo'lishi kerak.
    </noscript>

    <header>

        <h1>
            <span>Kage</span> Translate
        </h1>

        <p>
            Manga • Manhwa • PDF • Rasm tarjimoni
        </p>

    </header>

    <main>

        <!-- Original til -->

        <section class="card">

            <h2>Original til</h2>

            <button type="button"
        id="englishBtn"
        onclick="setSourceLanguage('en', this)">

    🇺🇸 Inglizcha

</button>

<button type="button"
        id="russianBtn"
        onclick="setSourceLanguage('ru', this)">

    🇷🇺 Ruscha

</button>

        </section>


        <!-- Tarjima tili -->

        <section class="card">

            <h2>Tarjima tili</h2>

            <button type="button"
        id="targetUzBtn"
        onclick="setTargetLanguage('uz', this)">

    🇺🇿 O'zbekcha

</button>

<button type="button"
        id="targetRuBtn"
        onclick="setTargetLanguage('ru', this)">

    🇷🇺 Ruscha

</button>

<button type="button"
        id="targetEnBtn"
        onclick="setTargetLanguage('en', this)">

    🇺🇸 Inglizcha

</button>

        </section>


        <!-- Shrift -->

        <section class="card">

            <h2>Shrift</h2>

            <button type="button" onclick="setFont('normal', this)">
    Oddiy
</button>

<button type="button" onclick="setFont('manga', this)">
    Manga
</button>

<button type="button" onclick="setFont('handwritten', this)">
    Handwritten
</button>

        </section>


        <!-- Fayl -->

        <section class="card">

            <h2>Fayl yuklash</h2>

            <input
    type="file"
    id="pdfInput"
    accept=".pdf,.png,.jpg,.jpeg,.webp"
    multiple>

        </section>


        <!-- Boshlash -->

        <section class="card">

            <button
    type="button"
    id="goBtn"
    onclick="startTranslation()"
    disabled>

    Tarjima qilishni boshlash

</button>

        </section>


        <!-- Holat -->

        <section class="card">

            <h2>Holati</h2>

            <p id="statusText">

        Fayl tanlanmagan

</p>

<div id="loadingSpinner" class="spinner" hidden></div>

<div class="progress">

    <div
        id="progressBar"
        role="progressbar"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0">
    </div>

</div>

        </section>


        <!-- Natija -->

        <section class="card">

            <h2>Natija</h2>

            <div id="results">

    <p>

        Hozircha natija yo'q.

    </p>

</div>
            <hr>

<button
    type="button"
    id="downloadPdfBtn"
    onclick="downloadTranslatedPdf()"
    disabled>

    📄 Tarjima qilingan PDF-ni yuklab olish

</button>

        </section>

    </main>

    <script src="main.js"></script>

</body>

                    </html>
